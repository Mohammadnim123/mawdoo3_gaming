{% load static %}<!doctype html>
<html lang="{{ lang }}" dir="{{ dir }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ t.app_title }}{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'games/app.css' %}">
  {% block head %}{% endblock %}
</head>
<body>
  <div id="app">
    <header class="topbar">
      {% block back %}{% endblock %}
      <h1 class="brand">🎮 {{ t.heading }}</h1>
      <a class="btn" href="{{ toggle_url }}">{{ t.other_lang }}</a>
    </header>
    {% block content %}{% endblock %}
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
