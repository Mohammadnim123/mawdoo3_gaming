{# Mobile bottom tab bar with a raised gradient Create FAB (hidden on md+). #}
<nav class="fp-safe-b fixed inset-x-0 bottom-0 z-40 border-t border-edge-subtle bg-canvas/90 backdrop-blur md:hidden"
     aria-label="Primary">
  <div class="mx-auto grid h-14 max-w-md grid-cols-4 items-center px-2 text-[11px]">
    <a href="/" class="flex flex-col items-center gap-0.5 text-ink-secondary">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9v11h14V9"/></svg>
      {{ t.nav_home }}
    </a>
    <a href="/search" class="flex flex-col items-center gap-0.5 text-ink-secondary">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      {{ t.nav_search }}
    </a>
    <a href="/create" class="relative -mt-6 flex flex-col items-center gap-0.5 text-ink">
      <span class="grid h-12 w-12 place-items-center rounded-full text-ink-on-accent" style="background-image:var(--gradient-cta)">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
      </span>
      <span class="mt-0.5">{{ t.nav_create }}</span>
    </a>
    {% if user.is_authenticated %}
      <a href="/me" class="flex flex-col items-center gap-0.5 text-ink-secondary">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
        {{ t.nav_me }}
      </a>
    {% else %}
      <a href="/login" class="flex flex-col items-center gap-0.5 text-ink-secondary">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
        {{ t.nav_login }}
      </a>
    {% endif %}
  </div>
</nav>
