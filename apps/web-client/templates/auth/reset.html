{% extends "base.html" %}
{% block title %}Reset password · {{ site_name }}{% endblock %}
{% block main_class %}mx-auto flex min-h-[72vh] w-full max-w-md items-center px-4{% endblock %}
{% block content %}
<div class="fp-card w-full p-6">
  <h1 class="fp-title-section mb-4 text-ink">{{ t.auth_password }}</h1>
  <form method="post" action="/reset-password" class="grid gap-3">
    {% csrf_token %}
    <input type="hidden" name="token" value="{{ token }}">
    <input class="fp-input" type="password" name="password" required autocomplete="new-password"
           placeholder="{{ t.auth_password }}" aria-label="{{ t.auth_password }}">
    <button type="submit" class="fp-btn fp-btn-cta w-full">{{ t.acct_save }}</button>
  </form>
</div>
{% endblock %}
